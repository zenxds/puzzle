<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe5f3"/>
      <stop offset="1" stop-color="#cfe9ff"/>
    </linearGradient>
    <linearGradient id="mane" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5e7e"/>
      <stop offset="0.2" stop-color="#ffb24d"/>
      <stop offset="0.4" stop-color="#ffe14d"/>
      <stop offset="0.6" stop-color="#7be07b"/>
      <stop offset="0.8" stop-color="#5eb8ff"/>
      <stop offset="1" stop-color="#b07eff"/>
    </linearGradient>
  </defs>
  <!-- 背景天空 -->
  <rect width="400" height="400" fill="url(#sky1)"/>
  <!-- 远处彩虹 -->
  <g opacity="0.45">
    <circle cx="60" cy="430" r="220" fill="none" stroke="#ff7d9b" stroke-width="14"/>
    <circle cx="60" cy="430" r="206" fill="none" stroke="#ffb24d" stroke-width="14"/>
    <circle cx="60" cy="430" r="192" fill="none" stroke="#ffe14d" stroke-width="14"/>
    <circle cx="60" cy="430" r="178" fill="none" stroke="#7be07b" stroke-width="14"/>
    <circle cx="60" cy="430" r="164" fill="none" stroke="#5eb8ff" stroke-width="14"/>
    <circle cx="60" cy="430" r="150" fill="none" stroke="#b07eff" stroke-width="14"/>
  </g>
  <!-- 草地 -->
  <path d="M0 330 Q 100 310 200 325 T 400 320 L 400 400 L 0 400 Z" fill="#b8e9c9"/>
  <!-- 小云 -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="320" cy="70" rx="40" ry="18"/>
    <ellipse cx="345" cy="60" rx="26" ry="14"/>
    <ellipse cx="80" cy="100" rx="30" ry="13"/>
  </g>
  <!-- 小马身体 -->
  <ellipse cx="200" cy="280" rx="95" ry="55" fill="#ffd0e8"/>
  <!-- 小马腿 -->
  <rect x="148" y="290" width="22" height="60" rx="10" fill="#ffd0e8"/>
  <rect x="230" y="290" width="22" height="60" rx="10" fill="#ffd0e8"/>
  <rect x="170" y="300" width="22" height="55" rx="10" fill="#ffc0dc" opacity="0.9"/>
  <rect x="210" y="300" width="22" height="55" rx="10" fill="#ffc0dc" opacity="0.9"/>
  <!-- 尾巴（彩虹） -->
  <path d="M 110 270 Q 70 280 60 330 Q 80 320 100 320 Q 115 300 120 290 Z" fill="url(#mane)"/>
  <!-- 小马头 -->
  <ellipse cx="275" cy="200" rx="58" ry="56" fill="#ffd0e8"/>
  <!-- 鬃毛 -->
  <path d="M 240 150 Q 260 100 300 140 Q 320 110 340 160 Q 330 180 310 175 Q 290 195 250 180 Z" fill="url(#mane)"/>
  <path d="M 235 175 Q 220 200 230 230 Q 250 220 255 200 Z" fill="url(#mane)"/>
  <!-- 耳朵 -->
  <path d="M 250 145 L 245 175 L 260 165 Z" fill="#ffd0e8"/>
  <path d="M 310 145 L 320 175 L 305 168 Z" fill="#ffd0e8"/>
  <!-- 眼睛 -->
  <ellipse cx="265" cy="200" rx="11" ry="14" fill="#ffffff"/>
  <ellipse cx="295" cy="200" rx="11" ry="14" fill="#ffffff"/>
  <circle cx="266" cy="204" r="7" fill="#5e3a8c"/>
  <circle cx="296" cy="204" r="7" fill="#5e3a8c"/>
  <circle cx="263" cy="200" r="2.5" fill="#ffffff"/>
  <circle cx="293" cy="200" r="2.5" fill="#ffffff"/>
  <!-- 腮红 -->
  <ellipse cx="248" cy="225" rx="9" ry="5" fill="#ff8fb6" opacity="0.7"/>
  <ellipse cx="310" cy="225" rx="9" ry="5" fill="#ff8fb6" opacity="0.7"/>
  <!-- 嘴 -->
  <path d="M 270 235 Q 280 245 290 235" fill="none" stroke="#7a4368" stroke-width="3" stroke-linecap="round"/>
  <!-- 屁股印记：爱心 -->
  <path d="M 200 270 q -10 -12 -18 -4 q -8 8 0 16 l 18 16 l 18 -16 q 8 -8 0 -16 q -8 -8 -18 4 z" fill="#ff5e8e"/>
  <!-- 闪闪小星 -->
  <g fill="#ffe14d">
    <polygon points="60,180 64,192 76,192 66,200 70,212 60,204 50,212 54,200 44,192 56,192"/>
    <polygon points="360,250 363,258 371,258 365,263 367,271 360,266 353,271 355,263 349,258 357,258"/>
  </g>
</svg>
